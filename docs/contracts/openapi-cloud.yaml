openapi: 3.1.0
info:
  title: neo-fm Cloud API
  version: 0.1.0
  description: |
    Public REST API served by Next.js on Vercel. Authenticated via Supabase Auth.
    All audio rendering happens on the DGX side and is reached only through this surface.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
servers:
  - url: https://neo-fm.example.com
    description: production (TBD)
  - url: http://localhost:3000
    description: local dev

tags:
  - name: health
  - name: auth
  - name: songs
  - name: account

paths:
  /api/healthz:
    get:
      tags: [health]
      summary: Liveness probe
      operationId: healthz
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"

  /api/auth/signup:
    post:
      tags: [auth]
      summary: Email-password signup (Supabase Auth passthrough)
      operationId: authSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/auth/login:
    post:
      tags: [auth]
      summary: Email-password login (Supabase Auth passthrough)
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/me:
    get:
      tags: [account]
      summary: Current user profile
      operationId: getMe
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/songs:
    get:
      tags: [songs]
      summary: List current user's songs
      operationId: listSongs
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongList"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [songs]
      summary: Submit a new song generation request
      description: |
        Accepts either a fully-formed Song Document under `song_document` OR a
        `prompt`. The `prompt` branch is gated by the server-side feature flag
        `prompt_enabled` (off by default). Until Phase 10, requests using the
        `prompt` branch receive `501 Not Implemented` with the typed error
        `{ "error": "prompt_branch_not_yet_enabled" }`. The `song_document`
        branch is fully functional from Phase 4.
      operationId: createSong
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSongRequest"
      responses:
        "202":
          description: accepted, job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSongResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429":
          description: per-tier quota exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotaError"
        "501":
          description: prompt branch not yet enabled (pre-Phase-10)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/songs/{id}:
    get:
      tags: [songs]
      summary: Get one song with status and audio URL
      operationId: getSong
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: invalid request body
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: missing or invalid auth
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    HealthzResponse:
      type: object
      required: [status, phase]
      properties:
        status: { type: string, enum: [ok] }
        phase: { type: integer, minimum: 0 }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
        details: { type: object, additionalProperties: true }

    QuotaError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - type: object
          properties:
            remaining_seconds_until_reset: { type: integer }
            tier: { $ref: "#/components/schemas/Tier" }

    Tier:
      type: string
      enum: [free, creator, pro]

    SignupRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        name: { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    AuthSession:
      type: object
      required: [access_token, expires_in, user]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        expires_in: { type: integer }
        user: { $ref: "#/components/schemas/UserProfile" }

    UserProfile:
      type: object
      required: [id, email, tier]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        locale: { type: string }
        tier: { $ref: "#/components/schemas/Tier" }

    StyleFamily:
      type: string
      enum: [western, carnatic, hindustani, kannada-folk]

    Language:
      type: string
      description: ISO 639-1 (v1 allowed values; extensible later)
      enum: [en, hi, kn]

    Duration:
      type: integer
      description: target duration in seconds (v1 allowed values)
      enum: [30, 60, 90, 180]

    SectionType:
      type: string
      enum:
        - intro
        - verse
        - chorus
        - bridge
        - outro
        - pallavi
        - anupallavi
        - charanam
        - mukhda
        - antara
        - saranam
        - alaap
        - sargam
        - folk_refrain
        - folk_stanza

    SectionScript:
      type: string
      enum: [devanagari, tamil, kannada, latin]

    Section:
      type: object
      required: [id, type, target_seconds]
      properties:
        id: { type: string, minLength: 1, maxLength: 64 }
        type: { $ref: "#/components/schemas/SectionType" }
        lyrics: { type: string }
        script: { $ref: "#/components/schemas/SectionScript" }
        transliteration: { type: string }
        swara_sequence: { type: string }
        phonemes:
          type: array
          items: { type: string }
        target_seconds: { type: integer, minimum: 1, maximum: 360 }

    RagaSpec:
      type: object
      required: [name, system]
      properties:
        name: { type: string }
        system: { type: string, enum: [carnatic, hindustani] }
        arohana:
          type: array
          items: { type: string }
        avarohana:
          type: array
          items: { type: string }
        nyas:
          type: array
          items: { type: string }
        pakad: { type: string }

    Orchestration:
      type: object
      properties:
        lead_vocal: { type: string, enum: [male, female, instrumental] }
        instruments:
          type: array
          items: { type: string }
        texture: { type: string }

    SongDocument:
      type: object
      required: [language, style_family, target_duration_seconds, sections]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        language: { $ref: "#/components/schemas/Language" }
        style_family: { $ref: "#/components/schemas/StyleFamily" }
        tempo_bpm: { type: integer, minimum: 30, maximum: 240 }
        time_signature: { type: string }
        tala: { type: string }
        target_duration_seconds: { $ref: "#/components/schemas/Duration" }
        sections:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/Section" }
        orchestration: { $ref: "#/components/schemas/Orchestration" }
        raga: { $ref: "#/components/schemas/RagaSpec" }
        metadata:
          type: object
          additionalProperties: true

    CreateSongRequest:
      type: object
      description: provide either song_document OR prompt (not both)
      properties:
        song_document: { $ref: "#/components/schemas/SongDocument" }
        prompt: { type: string }
        language: { $ref: "#/components/schemas/Language" }
        style_family: { $ref: "#/components/schemas/StyleFamily" }
        target_duration_seconds: { $ref: "#/components/schemas/Duration" }
      oneOf:
        - required: [song_document]
        - required: [prompt, language, style_family, target_duration_seconds]

    CreateSongResponse:
      type: object
      required: [job_id, status]
      properties:
        job_id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/JobStatus" }
        song_id: { type: string, format: uuid }

    JobStatus:
      type: string
      enum: [queued, processing, completed, failed]

    Track:
      type: object
      required: [url, duration_seconds, format]
      properties:
        url: { type: string, format: uri, description: short-lived signed URL }
        duration_seconds: { type: integer }
        format: { type: string, enum: [wav, mp3, flac] }

    Song:
      type: object
      required: [id, status, song_document, created_at]
      properties:
        id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/JobStatus" }
        song_document: { $ref: "#/components/schemas/SongDocument" }
        track: { $ref: "#/components/schemas/Track" }
        error: { type: string }
        created_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }

    SongList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Song" }
        next_cursor: { type: string }
