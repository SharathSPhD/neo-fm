openapi: 3.1.0
info:
  title: neo-fm Cloud API
  version: 0.3.0
  description: |
    Public REST API served by Next.js on Vercel. Authenticated via Supabase Auth.
    All audio rendering happens on the DGX side and is reached only through
    this surface.

    Version 0.3.0 (v1.4 close-out):
      - Style family + language enums widened to match the v1.4 gallery
        (Sanskrit shloka, Bengali Rabindrasangeet, Telugu keerthana,
        Bollywood ballad, Tamil folk, Kannada light-classical).
      - `Section.voice_id` lifted into the contract so the per-section
        voice override is a first-class field (previously only the song-
        level `voice_id` was schematised, while sections carried it as
        an `additional` property).
      - `Section.type` enum extended with `shloka_verse`, `shloka_refrain`,
        and `phalashruti` for Sanskrit shloka rendering.
      - `CreateSongRequest.top_n_candidates` (1..8) lets clients ask the
        worker to produce alternates for the RLHF compare page.
      - New endpoints:
          * `POST /api/songs/{id}/preferences` — record a pairwise A/B vote
            against `public.preference_pairs` (RPC `record_preference_pair`).
          * `POST /api/songs/publish-batch` — atomic batch-publish helper
            backed by the `publish_song_batch` RPC.
    Version 0.2.0 (Phase 4 close-out):
      - Removed `/api/auth/signup` + `/api/auth/login` — never implemented on
        the server. Auth flows happen client-side via the Supabase SSR client
        (`@supabase/ssr`) and `middleware.ts` cookie refresh.
      - `QuotaError` now carries a `reason` discriminator (`rows_per_month`
        or `storage_bytes`) per ADR 0005 + ADR 0009.
      - Section.script enum extended with `telugu` and `bengali` to match the
        Zod source of truth in `packages/song-doc`.
      - Section.language added so per-section overrides match the cloud schema.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
servers:
  - url: https://neo-fm.example.com
    description: production (TBD)
  - url: http://localhost:3000
    description: local dev

tags:
  - name: health
  - name: songs
  - name: account

paths:
  /api/healthz:
    get:
      tags: [health]
      summary: Liveness probe
      operationId: healthz
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"

  /api/me:
    get:
      tags: [account]
      summary: Current user profile
      operationId: getMe
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/songs:
    get:
      tags: [songs]
      summary: List current user's songs
      operationId: listSongs
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SongList"
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [songs]
      summary: Submit a new song generation request
      description: |
        Accepts either a fully-formed Song Document under `song_document` OR a
        `prompt`. The `prompt` branch is gated by the server-side feature flag
        `NEO_FM_PROMPT_BRANCH_ENABLED` (off by default). Until Phase 10,
        requests using the `prompt` branch receive `501 Not Implemented` with
        the typed error `{ "error": "prompt_branch_not_yet_enabled" }`. The
        `song_document` branch is fully functional from Phase 4.
      operationId: createSong
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSongRequest"
      responses:
        "202":
          description: accepted, job enqueued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSongResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429":
          description: per-tier quota exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuotaError"
        "501":
          description: prompt branch not yet enabled (pre-Phase-10)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/songs/{id}:
    get:
      tags: [songs]
      summary: Get one song with status and audio URL
      operationId: getSong
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Song"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/songs/{id}/preferences:
    post:
      tags: [songs]
      summary: Record a pairwise A/B preference vote (v1.4 Sprint 16 RLHF)
      description: |
        Authenticated. Inserts one row into `public.preference_pairs`
        via the SECURITY DEFINER RPC `record_preference_pair`. The two
        track ids must belong to the same job (`id`) and the caller
        must own the job. The handler returns the inserted vote id.
      operationId: recordPreference
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreferenceVote"
      responses:
        "201":
          description: vote recorded
          content:
            application/json:
              schema:
                type: object
                required: [vote_id]
                properties:
                  vote_id: { type: string, format: uuid }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/songs/publish-batch:
    post:
      tags: [songs]
      summary: Atomically publish multiple songs (v1.4 Sprint 13)
      description: |
        Authenticated. Calls the SECURITY DEFINER RPC `publish_song_batch`
        which validates ownership of every id and either publishes them
        all or rolls back. The publish copy (storage object move from the
        private `tracks` bucket to the public `public-tracks` bucket) is
        sequenced server-side; failures roll the batch back.
      operationId: publishBatch
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchPublishRequest"
      responses:
        "200":
          description: batch published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchPublishResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: invalid request body
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: missing or invalid auth
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    HealthzResponse:
      type: object
      required: [status, phase]
      properties:
        status: { type: string, enum: [ok] }
        phase: { type: integer, minimum: 0 }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
        details: { type: object, additionalProperties: true }

    QuotaError:
      allOf:
        - $ref: "#/components/schemas/Error"
        - type: object
          required: [error, reason]
          properties:
            error: { type: string, enum: [quota_exceeded] }
            reason:
              type: string
              description: |
                Why the request was rejected.
                  - `rows_per_month`: per-tier monthly job count (ADR 0009).
                    `remaining_seconds_until_reset` is positive.
                  - `storage_bytes`: per-tier storage byte cap (ADR 0005).
                    `remaining_seconds_until_reset` is `-1` — clients render
                    "delete an old song to free up space" copy instead of a
                    countdown.
              enum: [rows_per_month, storage_bytes]
            remaining_seconds_until_reset: { type: integer }
            tier: { $ref: "#/components/schemas/Tier" }

    Tier:
      type: string
      enum: [free, creator, pro]

    UserProfile:
      type: object
      required: [id, email, tier]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        locale: { type: string }
        tier: { $ref: "#/components/schemas/Tier" }

    StyleFamily:
      type: string
      description: |
        v1.4 widened style set. Keep in lockstep with the Zod source of
        truth in `packages/song-doc/src/index.ts`.
      enum:
        - western
        - carnatic
        - hindustani
        - kannada-folk
        - kannada-light-classical
        - tamil-folk
        - bollywood-ballad
        - sanskrit-shloka
        - bengali-rabindrasangeet
        - telugu-keerthana

    Language:
      type: string
      description: |
        ISO 639-1 widened in v1.4 to cover the additional language
        canvases (Tamil, Bengali, Telugu, Sanskrit).
      enum: [en, hi, kn, ta, bn, te, sa]

    Duration:
      type: integer
      description: target duration in seconds (v1 allowed values)
      enum: [30, 60, 90, 180]

    SectionType:
      type: string
      enum:
        - intro
        - verse
        - chorus
        - bridge
        - outro
        - pallavi
        - anupallavi
        - charanam
        - mukhda
        - antara
        - saranam
        - alaap
        - sargam
        - folk_refrain
        - folk_stanza
        - shloka_verse
        - shloka_refrain
        - phalashruti

    SectionScript:
      type: string
      enum: [devanagari, tamil, kannada, telugu, bengali, latin]

    Section:
      type: object
      required: [id, type, target_seconds]
      properties:
        id: { type: string, minLength: 1, maxLength: 64 }
        type: { $ref: "#/components/schemas/SectionType" }
        lyrics: { type: string }
        language:
          $ref: "#/components/schemas/Language"
          description: per-section override of the document-level language
        script: { $ref: "#/components/schemas/SectionScript" }
        transliteration: { type: string }
        swara_sequence: { type: string }
        phonemes:
          type: array
          items: { type: string }
        target_seconds: { type: integer, minimum: 1, maximum: 360 }
        voice_id:
          type: string
          minLength: 1
          maxLength: 64
          description: |
            v1.4 Sprint 5: per-section override of the song-level voice_id.

    RagaSpec:
      type: object
      required: [name, system]
      properties:
        name: { type: string }
        system: { type: string, enum: [carnatic, hindustani] }
        arohana:
          type: array
          items: { type: string }
        avarohana:
          type: array
          items: { type: string }
        nyas:
          type: array
          items: { type: string }
        pakad: { type: string }

    Orchestration:
      type: object
      properties:
        lead_vocal: { type: string, enum: [male, female, instrumental] }
        instruments:
          type: array
          items: { type: string }
        texture: { type: string }

    SongDocument:
      type: object
      required: [language, style_family, target_duration_seconds, sections]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        language: { $ref: "#/components/schemas/Language" }
        style_family: { $ref: "#/components/schemas/StyleFamily" }
        tempo_bpm: { type: integer, minimum: 30, maximum: 240 }
        time_signature: { type: string }
        tala: { type: string }
        target_duration_seconds: { $ref: "#/components/schemas/Duration" }
        sections:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/Section" }
        orchestration: { $ref: "#/components/schemas/Orchestration" }
        raga: { $ref: "#/components/schemas/RagaSpec" }
        voice_id:
          type: string
          minLength: 1
          maxLength: 64
          description: |
            v1.4 Sprint 5: song-level default voice for vocal-synth.
        background_mix:
          type: object
          description: |
            v1.4 Sprint 2: free-form mix knobs (density / dynamics /
            brightness / reverb). The worker forwards them verbatim to
            the mixer.
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true

    CreateSongRequest:
      type: object
      description: provide either song_document OR prompt (not both)
      properties:
        song_document: { $ref: "#/components/schemas/SongDocument" }
        prompt: { type: string }
        language: { $ref: "#/components/schemas/Language" }
        style_family: { $ref: "#/components/schemas/StyleFamily" }
        target_duration_seconds: { $ref: "#/components/schemas/Duration" }
        top_n_candidates:
          type: integer
          minimum: 1
          maximum: 8
          default: 1
          description: |
            v1.4 Sprint 16: how many alternates the worker should produce
            (1 keeps the legacy single-candidate path). Surfaced in the
            queue message as `top_n_candidates`.
      oneOf:
        - required: [song_document]
        - required: [prompt, language, style_family, target_duration_seconds]

    PreferenceVote:
      type: object
      required: [winner_track_id, loser_track_id]
      properties:
        winner_track_id: { type: string, format: uuid }
        loser_track_id: { type: string, format: uuid }
        vote_source:
          type: string
          default: compare-page
          description: free-form tag; rejected values are coerced server-side.

    BatchPublishRequest:
      type: object
      required: [song_ids]
      properties:
        song_ids:
          type: array
          minItems: 1
          maxItems: 50
          items: { type: string, format: uuid }
        visibility:
          type: string
          enum: [public]
          default: public

    BatchPublishResponse:
      type: object
      required: [published_song_ids]
      properties:
        published_song_ids:
          type: array
          items: { type: string, format: uuid }

    CreateSongResponse:
      type: object
      required: [job_id, status]
      properties:
        job_id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/JobStatus" }
        song_id: { type: string, format: uuid }

    JobStatus:
      type: string
      enum: [queued, processing, completed, failed]

    Track:
      type: object
      required: [url, duration_seconds, format]
      properties:
        url: { type: string, format: uri, description: short-lived signed URL }
        duration_seconds: { type: integer }
        format: { type: string, enum: [wav, mp3, flac] }

    Song:
      type: object
      required: [id, status, song_document, created_at]
      properties:
        id: { type: string, format: uuid }
        status: { $ref: "#/components/schemas/JobStatus" }
        song_document: { $ref: "#/components/schemas/SongDocument" }
        track: { $ref: "#/components/schemas/Track" }
        error: { type: string }
        created_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time }

    SongList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Song" }
        next_cursor: { type: string }
