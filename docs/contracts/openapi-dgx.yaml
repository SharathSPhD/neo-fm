openapi: 3.1.0
info:
  title: neo-fm DGX music-inference API
  version: 0.3.0
  description: |
    Internal API exposed by `services/music-inference` running on the DGX Spark.
    Reached only by `services/dgx-worker` over the docker-compose network.
    Never exposed to the public internet.

    All non-health endpoints require shared-secret HMAC authentication
    (see ADR 0003). The worker signs `sha256(body || "\n" || timestamp)`
    using `MUSIC_INFERENCE_HMAC_SECRET` and sends:
      - `X-NeoFM-Timestamp: <unix-seconds>`
      - `X-NeoFM-Signature: <hex hmac-sha256>`
    Timestamp skew tolerance is 60 seconds.

    Version 0.3.0 (Phase 4 close-out):
      - `POST /v1/generate` returns raw `audio/wav` bytes, not JSON. The worker
        streams the response straight into Supabase Storage and never JSON-parses.
      - `GenerateRequest` gains top-level `language` and `trace_id` to match
        the worker payload (previously implied via the queue message).
      - `SectionScript` extended with `telugu` and `bengali` to match the
        cloud Zod schema and song-doc fixtures.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
servers:
  - url: http://music-inference:8000
    description: docker-compose internal
  - url: http://localhost:8000
    description: local dev (not exposed to host in prod compose)

tags:
  - name: health
  - name: generate

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness and readiness probe
      description: |
        Unauthenticated. Reports model load state, GPU memory in use,
        and pgmq lag (set by the worker at heartbeat — value may be stale).
      operationId: healthz
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"

  /v1/generate:
    post:
      tags: [generate]
      summary: Generate audio for one Song Document
      description: |
        Synchronous (the caller is the queue-driven worker, not a user).
        Returns raw audio bytes — `Content-Type: audio/wav` — that the worker
        streams directly into Supabase Storage.
      operationId: generate
      security:
        - hmacAuth: []
      parameters:
        - in: header
          name: X-NeoFM-Timestamp
          required: true
          schema: { type: string, description: unix seconds }
        - in: header
          name: X-NeoFM-Trace-Id
          required: false
          schema: { type: string, description: propagated trace id from queue message }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "200":
          description: generation complete; body is raw audio
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        "400":
          description: invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "401":
          description: missing or invalid HMAC signature / stale timestamp
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: |
            model not loaded yet, or circuit-breaker open (GPU above threshold;
            ADR around C1). Worker treats this as a retryable error per
            ADR 0008's 5xx bucket.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  securitySchemes:
    hmacAuth:
      type: apiKey
      in: header
      name: X-NeoFM-Signature
      description: |
        hex(hmac-sha256(MUSIC_INFERENCE_HMAC_SECRET, body || "\n" || X-NeoFM-Timestamp))

  schemas:
    HealthzResponse:
      type: object
      required: [status, model_loaded, phase]
      properties:
        status: { type: string, enum: [ok, degraded] }
        model_loaded: { type: boolean }
        model_version: { type: string }
        gpu_memory_used_mb: { type: integer }
        gpu_utilization_pct: { type: integer, minimum: 0, maximum: 100 }
        queue_lag_seconds: { type: integer, description: last value observed by worker; may be stale }
        phase: { type: integer }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
        details: { type: object, additionalProperties: true }

    Language:
      type: string
      description: ISO 639-1 (v1 allowed values)
      enum: [en, hi, kn]

    SectionType:
      type: string
      enum:
        - intro
        - verse
        - chorus
        - bridge
        - outro
        - pallavi
        - anupallavi
        - charanam
        - mukhda
        - antara
        - saranam
        - alaap
        - sargam
        - folk_refrain
        - folk_stanza

    SectionScript:
      type: string
      description: |
        Matches the cloud Zod `SectionScript` enum. Telugu + bengali extend the
        set in v0.3.0 to keep fixtures parseable on both sides.
      enum: [devanagari, tamil, kannada, telugu, bengali, latin]

    StyleFamily:
      type: string
      enum: [western, carnatic, hindustani, kannada-folk]

    RagaSpec:
      type: object
      required: [name, system]
      properties:
        name: { type: string }
        system: { type: string, enum: [carnatic, hindustani] }
        arohana:
          type: array
          items: { type: string }
        avarohana:
          type: array
          items: { type: string }
        nyas:
          type: array
          items: { type: string }
        pakad: { type: string }

    Orchestration:
      type: object
      properties:
        lead_vocal: { type: string, enum: [male, female, instrumental] }
        instruments:
          type: array
          items: { type: string }
        texture: { type: string }

    GenerateRequestSection:
      type: object
      description: |
        Mirrors cloud `Section` schema (see openapi-cloud.yaml). The DGX side
        adds `tags` — the co-composer's HeartMuLa prompt tags derived from the
        Song Document — and keeps every field the cloud passes through so the
        inference engine has full musical context.
      required: [id, type, target_seconds]
      properties:
        id: { type: string, minLength: 1, maxLength: 64 }
        type: { $ref: "#/components/schemas/SectionType" }
        lyrics: { type: string }
        language: { $ref: "#/components/schemas/Language" }
        script: { $ref: "#/components/schemas/SectionScript" }
        transliteration: { type: string }
        swara_sequence: { type: string }
        phonemes:
          type: array
          items: { type: string }
        target_seconds: { type: integer, minimum: 1, maximum: 360 }
        tags:
          type: array
          description: co-composer-derived HeartMuLa prompt tags
          items: { type: string }

    GenerateRequest:
      type: object
      required: [job_id, sections, style_family, language]
      properties:
        job_id: { type: string, format: uuid }
        attempt_id:
          type: string
          format: uuid
          description: |
            Mirrors `attempt_id` in the queue message (ADR 0008). Used by
            music-inference for idempotency / debug correlation.
        trace_id:
          type: string
          description: |
            Propagated from the queue message (ADR 0007). The server also
            accepts trace_id via `X-NeoFM-Trace-Id`; when both are present,
            the header wins.
        language: { $ref: "#/components/schemas/Language" }
        style_family: { $ref: "#/components/schemas/StyleFamily" }
        tempo_bpm: { type: integer, minimum: 30, maximum: 240 }
        time_signature: { type: string }
        tala: { type: string }
        target_duration_seconds: { type: integer, minimum: 1, maximum: 360 }
        raga: { $ref: "#/components/schemas/RagaSpec" }
        orchestration: { $ref: "#/components/schemas/Orchestration" }
        sections:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/GenerateRequestSection" }
        output_format:
          type: string
          enum: [wav, mp3, flac]
          default: wav
        sample_rate:
          type: integer
          default: 48000
