openapi: 3.1.0
info:
  title: neo-fm DGX music-inference API
  version: 0.1.0
  description: |
    Internal API exposed by `services/music-inference` running on the DGX Spark.
    Reached only by `services/dgx-worker` over the docker-compose network.
    Never exposed to the public internet.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
servers:
  - url: http://music-inference:8000
    description: docker-compose internal
  - url: http://localhost:8000
    description: local dev

tags:
  - name: health
  - name: generate

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness and readiness probe
      operationId: healthz
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"

  /v1/generate:
    post:
      tags: [generate]
      summary: Generate audio for one Song Document
      description: |
        Synchronous in v1 (the caller is the queue-driven worker, not a user).
        Returns 501 in Phase 0 / Phase 1 stub builds; real audio output starts Phase 1.
      operationId: generate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "200":
          description: generation complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateResponse"
        "400":
          description: invalid request
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "501":
          description: not implemented yet (Phase 0 stub)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  schemas:
    HealthzResponse:
      type: object
      required: [status, model_loaded, phase]
      properties:
        status: { type: string, enum: [ok, degraded] }
        model_loaded: { type: boolean }
        model_version: { type: string }
        gpu_memory_used_mb: { type: integer }
        queue_lag_seconds: { type: integer }
        phase: { type: integer }

    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
        details: { type: object, additionalProperties: true }

    GenerateRequestSection:
      type: object
      required: [id, target_seconds]
      properties:
        id: { type: string }
        lyrics: { type: string }
        language: { type: string }
        tags:
          type: array
          items: { type: string }
        target_seconds: { type: integer, minimum: 1, maximum: 360 }

    GenerateRequest:
      type: object
      required: [job_id, sections]
      properties:
        job_id: { type: string, format: uuid }
        sections:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/GenerateRequestSection" }
        output_format:
          type: string
          enum: [wav, mp3, flac]
          default: wav
        sample_rate:
          type: integer
          default: 48000

    GenerateResponseSection:
      type: object
      required: [id, file_path]
      properties:
        id: { type: string }
        file_path: { type: string, description: filesystem path on DGX, e.g. /mnt/audio/jobs/<uuid>/intro.wav }

    GenerateResponse:
      type: object
      required: [job_id, sections, duration_seconds, metadata]
      properties:
        job_id: { type: string, format: uuid }
        sections:
          type: array
          items: { $ref: "#/components/schemas/GenerateResponseSection" }
        combined_file_path: { type: string }
        duration_seconds: { type: integer }
        metadata:
          type: object
          properties:
            model: { type: string }
            version: { type: string }
          additionalProperties: true
