openapi: 3.1.0
info:
  title: neo-fm vocal-synth API
  version: 0.1.0
  description: |
    Internal API exposed by `services/vocal-synth` running on the DGX
    Spark. Reached only by `services/dgx-worker` over the docker-compose
    network. Never exposed to the public internet.

    HMAC-authenticated like music-inference (ADR 0003). The worker signs
    `sha256(body || "\n" || timestamp)` using
    `VOCAL_SYNTH_HMAC_SECRET` and sends:
      - `X-NeoFM-Timestamp: <unix-seconds>`
      - `X-NeoFM-Signature: <hex hmac-sha256>`

    Renders a mono PCM-16 WAV vocal stem at the requested sample rate.
    The dgx-worker calls this once per configured language and mixes
    the stems on top of the HeartMuLa instrumental (see `app/mixer.py`).
  license:
    name: Apache-2.0
    identifier: Apache-2.0
servers:
  - url: http://vocal-synth:8089
    description: docker-compose internal

tags:
  - name: health
  - name: vocalize

paths:
  /healthz:
    get:
      tags: [health]
      summary: Liveness + model load state.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"
  /v1/vocalize:
    post:
      tags: [vocalize]
      summary: Synthesise a mono vocal stem for one language.
      security:
        - hmac: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VocalizeRequest"
      responses:
        "200":
          description: mono PCM-16 WAV at the request sample_rate
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/UnauthorizedHmac"
        "503":
          $ref: "#/components/responses/ModelNotLoaded"

components:
  securitySchemes:
    hmac:
      type: apiKey
      in: header
      name: X-NeoFM-Signature
      description: HMAC-SHA256 signature; pairs with X-NeoFM-Timestamp.
  responses:
    UnauthorizedHmac:
      description: HMAC signature or timestamp rejected.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
    ModelNotLoaded:
      description: Vocal model not ready.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorBody"
  schemas:
    HealthzResponse:
      type: object
      required: [status, model_loaded, phase]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        model_loaded:
          type: boolean
        model_version:
          type: string
          nullable: true
        phase:
          type: integer
    VocalizeRequest:
      type: object
      required:
        - job_id
        - language
        - style_family
        - target_duration_seconds
        - sections
      properties:
        job_id:
          type: string
          format: uuid
        attempt_id:
          type: string
          format: uuid
          nullable: true
        trace_id:
          type: string
          nullable: true
        language:
          type: string
          enum: [en, hi, kn, ta, te, bn]
        style_family:
          type: string
          enum: [western, carnatic, hindustani, kannada-folk]
        voice_timbre:
          type: string
          enum: [male, female, androgynous]
          default: androgynous
        sample_rate:
          type: integer
          default: 48000
          minimum: 8000
          maximum: 96000
        target_duration_seconds:
          type: integer
          minimum: 1
          maximum: 600
        sections:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/VocalizeRequestSection"
    VocalizeRequestSection:
      type: object
      required: [id, type, target_seconds]
      properties:
        id:
          type: string
          maxLength: 64
        type:
          type: string
        lyrics:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        script:
          type: string
          enum: [devanagari, tamil, kannada, telugu, bengali, latin]
          nullable: true
        transliteration:
          type: string
          nullable: true
        target_seconds:
          type: integer
          minimum: 1
          maximum: 360
        tempo_bpm:
          type: integer
          nullable: true
        raga_name:
          type: string
          nullable: true
    ErrorBody:
      type: object
      required: [error]
      properties:
        error:
          type: string
        details:
          type: object
          additionalProperties: true
