# Copy this file to .github/workflows/supabase-migrations.yml once
# SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD are pasted into
# Settings → Secrets and variables → Actions on SharathSPhD/neo-fm.
#
# Until then this is intentionally not wired up: every Phase 4 migration
# was already applied to the live project via MCP and is recorded in
# supabase_migrations.schema_migrations, so the workflow has no work to
# do on first deploy.
#
# The "precheck" step skips gracefully when secrets are missing so the
# job never red-flags a PR.

name: supabase-migrations

on:
  push:
    branches: [main]
    paths:
      - "infra/supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  pull_request:
    paths:
      - "infra/supabase/migrations/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check secrets
        id: precheck
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          missing=0
          for var in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_REF; do
            if [ -z "${!var:-}" ]; then
              echo "::warning::$var is not set; skipping migration apply."
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "have_secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "have_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.precheck.outputs.have_secrets == 'true'

      - uses: supabase/setup-cli@v1
        if: steps.precheck.outputs.have_secrets == 'true'
        with:
          version: latest

      - name: supabase db push
        if: steps.precheck.outputs.have_secrets == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push --workdir infra/supabase
