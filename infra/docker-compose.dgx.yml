# neo-fm — docker-compose for DGX-side services.
#
# Phase 4 (merged): real dgx-worker pulling from Supabase pgmq and calling
# music-inference over the internal compose network. HeartMuLa weights are
# mounted read-only from the host. No public ingress; cloud never reaches in.
#
# Phase 1 (this branch): music-inference runs the real HeartMuLa model on GPU.
# The container target defaults to `phase1`. Set MUSIC_INFERENCE_STAGE=phase0
# in the env file to drop back to the no-model fake (useful while waiting
# for weight download or on machines without an NVIDIA runtime).
#
# Usage (from repo root):
#   bash scripts/dgx-bootstrap.sh                   # writes infra/.env.dgx + brings stack up
#
# ...or manually:
#   cp infra/.env.dgx.example infra/.env.dgx        # fill MUSIC_INFERENCE_HMAC_SECRET etc
#   python scripts/download-heartmula.py            # pull weights to /mnt/models/heartmula
#   docker compose -f infra/docker-compose.dgx.yml --env-file infra/.env.dgx up --build
#
# Per ADR 0003 (internal-API HMAC):
# - music-inference exposes port 8000 only on the internal compose network,
#   NOT on the host. The dgx-worker reaches it as `http://music-inference:8000`.
# - The shared HMAC secret lives in `infra/.env.dgx` (mode 0600) and is
#   injected via env_file. It is **never** mirrored to Vercel/cloud
#   (cloud has no business calling music-inference).
#
# Per ADR 0004 the dgx-worker connects to Supabase Postgres as the dedicated
# `neo_fm_worker` role (PG_DSN), not as `service_role`. Storage uploads use
# the service-role key over the public Supabase REST endpoint.

name: neo-fm

services:
  music-inference:
    build:
      context: ../services/music-inference
      dockerfile: Dockerfile
      args:
        STAGE: "${MUSIC_INFERENCE_STAGE:-phase1}"
    image: "neo-fm/music-inference:${MUSIC_INFERENCE_STAGE:-phase1}"
    container_name: neo-fm-music-inference
    restart: unless-stopped
    expose:
      - "8000"
    # Bind to 127.0.0.1 only so the dgx-smoke.sh / build-demo.sh
    # operator path can curl localhost:8000 for healthz + /v1/generate.
    # ADR 0003 holds: no public ingress; loopback-only is internal.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env.dgx
    environment:
      PHASE: "1"
      MUSIC_INFERENCE_HMAC_SECRET: "${MUSIC_INFERENCE_HMAC_SECRET:?MUSIC_INFERENCE_HMAC_SECRET must be set in infra/.env.dgx (see ADR 0003)}"
      MUSIC_INFERENCE_HMAC_SECRET_NEXT: "${MUSIC_INFERENCE_HMAC_SECRET_NEXT:-}"
      HEARTMULA_CKPT_DIR: "${HEARTMULA_CKPT_DIR:-/mnt/models/heartmula}"
      HEARTMULA_VERSION: "${HEARTMULA_VERSION:-3B}"
      HEARTMULA_MULA_DEVICE: "${HEARTMULA_MULA_DEVICE:-cuda}"
      HEARTMULA_CODEC_DEVICE: "${HEARTMULA_CODEC_DEVICE:-cuda}"
      HEARTMULA_MULA_DTYPE: "${HEARTMULA_MULA_DTYPE:-bfloat16}"
      HEARTMULA_CODEC_DTYPE: "${HEARTMULA_CODEC_DTYPE:-float32}"
      HEARTMULA_LAZY_LOAD: "${HEARTMULA_LAZY_LOAD:-0}"
      HEARTMULA_DEFER_LOAD: "${HEARTMULA_DEFER_LOAD:-0}"
      MUSIC_INFERENCE_FAKE_MODEL: "${MUSIC_INFERENCE_FAKE_MODEL:-0}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - "${HEARTMULA_CKPT_DIR_HOST:-/mnt/models/heartmula}:/mnt/models/heartmula:ro"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - >-
          import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8000/healthz', timeout=4);
          sys.exit(0 if r.status==200 else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      # Model weights take ~30s to load even on H100/Grace-Blackwell.
      # 180s start_period prevents docker from killing the container
      # during the cold-start window.
      start_period: 180s

  dgx-worker:
    build:
      context: ../services/dgx-worker
      dockerfile: Dockerfile
    image: neo-fm/dgx-worker:phase-4
    container_name: neo-fm-dgx-worker
    restart: unless-stopped
    expose:
      - "9101"
    ports:
      - "127.0.0.1:9101:9101"
    depends_on:
      music-inference:
        condition: service_healthy
    env_file:
      - .env.dgx
    environment:
      PHASE: "5"
      MUSIC_INFERENCE_URL: "http://music-inference:8000"
      # Sprint 5: when VOCAL_SYNTH_URL is set the worker fans out to
      # vocal-synth per language and mixes the stems on top of the
      # HeartMuLa instrumental (see services/dgx-worker/app/mixer.py).
      # Leave VOCAL_SYNTH_URL empty to run instrumental-only.
      VOCAL_SYNTH_URL: "${VOCAL_SYNTH_URL:-}"
      VOCAL_SYNTH_HMAC_SECRET: "${VOCAL_SYNTH_HMAC_SECRET:-}"
      VOCAL_LANGUAGES: "${VOCAL_LANGUAGES:-hi,kn,ta,te,bn}"
      VOCAL_VOICE_TIMBRE: "${VOCAL_VOICE_TIMBRE:-androgynous}"
      VOCAL_SYNTH_TIMEOUT_SECONDS: "${VOCAL_SYNTH_TIMEOUT_SECONDS:-300}"
      # v1.5 Sprint 1: PWM lyric expansion + IndicBART fallback.
      PWM_API_URL: "${PWM_API_URL:-}"
      PWM_HMAC_SECRET: "${PWM_HMAC_SECRET:-}"
      LYRIC_GEN_URL: "${LYRIC_GEN_URL:-}"
      LYRIC_GEN_HMAC_SECRET: "${LYRIC_GEN_HMAC_SECRET:-}"
      # v1.3 Sprint 3: cover-art sidecar.
      COVER_ART_SYNTH_URL: "${COVER_ART_SYNTH_URL:-}"
      COVER_ART_SYNTH_HMAC_SECRET: "${COVER_ART_SYNTH_HMAC_SECRET:-}"
      # ADR 0011 governor coordination. The host bind-mount of
      # /var/run/neo-fm lets `scripts/neo-fm-governor.py` pause/resume
      # the worker from outside the container.
      GOVERNOR_STATE_PATH: "${GOVERNOR_STATE_PATH:-/var/run/neo-fm/governor.state}"
      GOVERNOR_POLL_SECONDS: "${GOVERNOR_POLL_SECONDS:-2}"
      # Sprint 7 observability: dgx-worker's embedded /metrics HTTP
      # listener. Scraped by Prometheus on the compose network.
      METRICS_PORT: "${WORKER_METRICS_PORT:-9101}"
      LOG_LEVEL: "INFO"
    volumes:
      - "${GOVERNOR_STATE_HOST_DIR:-/var/run/neo-fm}:/var/run/neo-fm"

  vocal-synth:
    # Sprint 5: vocal-synth becomes a real Indic singing-voice sidecar
    # (kenpath/svara-tts-v1 by default). The `dgx` Dockerfile stage
    # builds on top of nvcr.io/nvidia/pytorch and brings in torch +
    # transformers; the `ci` stage is the lighter no-GPU image.
    build:
      context: ../services/vocal-synth
      dockerfile: Dockerfile
      args:
        STAGE: "${VOCAL_SYNTH_STAGE:-dgx}"
    image: "neo-fm/vocal-synth:${VOCAL_SYNTH_STAGE:-dgx}"
    container_name: neo-fm-vocal-synth
    restart: unless-stopped
    expose:
      - "8089"
    ports:
      - "127.0.0.1:8089:8089"
    env_file:
      - .env.dgx
    environment:
      PHASE: "5"
      VOCAL_SYNTH_HMAC_SECRET: "${VOCAL_SYNTH_HMAC_SECRET:?VOCAL_SYNTH_HMAC_SECRET must be set in infra/.env.dgx (see ADR 0003)}"
      VOCAL_SYNTH_HMAC_SECRET_NEXT: "${VOCAL_SYNTH_HMAC_SECRET_NEXT:-}"
      VOCAL_MODEL_BACKEND: "${VOCAL_MODEL_BACKEND:-auto}"
      VOCAL_MODEL_ID: "${VOCAL_MODEL_ID:-kenpath/svara-tts-v1}"
      HF_HOME: "${VOCAL_HF_HOME:-/var/cache/huggingface}"
      NEO_FM_OFFLINE: "${NEO_FM_OFFLINE:-0}"
      NEO_FM_REQUIRE_REAL_MODEL: "${NEO_FM_REQUIRE_REAL_MODEL:-0}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - "${VOCAL_HF_HOME_HOST:-/home/sharaths/.cache/huggingface}:/var/cache/huggingface"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - >-
          import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8089/healthz', timeout=4);
          sys.exit(0 if r.status==200 else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  pwm-api:
    # Phase 1: thin FastAPI wrapper around the Pratyabhijñā World Model
    # (PWM) creative-generation backend. The PWM project and its
    # pwm-phase2 source live on the DGX host -- we volume-mount them
    # read-only rather than copying them into the image (their ML
    # dependencies are large, GPU-tuned, and operator-owned).
    #
    # Wrapper adds:
    #   - HMAC auth (ADR 0003) keyed by PWM_HMAC_SECRET
    #   - Structured JSON logs (ADR 0007)
    #   - A neo-fm-shaped /v1/generate-lyric that translates StyleFamily
    #     -> PWM Domain before invoking the upstream API.
    build:
      context: ../services/pwm-api
      dockerfile: Dockerfile
      args:
        STAGE: "${PWM_API_STAGE:-phase1}"
    image: "neo-fm/pwm-api:${PWM_API_STAGE:-phase1}"
    container_name: neo-fm-pwm-api
    restart: unless-stopped
    expose:
      - "9000"
    # Loopback bind for operator curl + smoke tests. Music-inference
    # owns :8000; PWM owns :9000. Internal calls go over the compose
    # bridge as ``http://pwm-api:9000``.
    ports:
      - "127.0.0.1:9000:9000"
    env_file:
      - .env.dgx
    environment:
      PHASE: "1"
      PWM_HMAC_SECRET: "${PWM_HMAC_SECRET:?PWM_HMAC_SECRET must be set in infra/.env.dgx (see ADR 0003)}"
      PWM_HMAC_SECRET_NEXT: "${PWM_HMAC_SECRET_NEXT:-}"
      PWM_PROJECT_PATH: "/opt/pwm"
      PWM_PHASE2_PATH: "/opt/pwm-phase2"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    volumes:
      # Read-only mounts: the wrapper imports from the PWM repo at
      # runtime; we don't want a container restart to mutate the
      # operator's working tree.
      - "${PWM_PROJECT_HOST_PATH:-/home/sharaths/projects/PWM}:/opt/pwm:ro"
      - "${PWM_PHASE2_HOST_PATH:-/home/sharaths/projects/pwm-phase2}:/opt/pwm-phase2:ro"
      - "${PWM_VLLM_ENV_HOST_PATH:-/home/sharaths/vllm-env}:/opt/vllm-env:ro"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "-fsS"
        - "http://localhost:9000/healthz"
      interval: 30s
      timeout: 10s
      retries: 3
      # PWM's lifespan kicks off background WM warmup. /healthz reports
      # ``pwm_ready`` independently so we don't need to wait for the
      # full warm-up to mark the container healthy.
      start_period: 60s

  lyric-gen:
    # Phase 1 (v1.5 Sprint 1): IndicBART SFT sidecar for Indic section lyrics.
    # The dgx stage ships torch + transformers; phase0 runs the FakeLyricGenModel
    # for CI smoke. Never internet-facing — HMAC-authenticated internal API.
    build:
      context: ../services/lyric-gen
      dockerfile: Dockerfile
      args:
        STAGE: "${LYRIC_GEN_STAGE:-dgx}"
    image: "neo-fm/lyric-gen:${LYRIC_GEN_STAGE:-dgx}"
    container_name: neo-fm-lyric-gen
    restart: unless-stopped
    expose:
      - "8090"
    ports:
      - "127.0.0.1:8090:8090"
    env_file:
      - .env.dgx
    environment:
      PHASE: "1"
      LYRIC_GEN_HMAC_SECRET: "${LYRIC_GEN_HMAC_SECRET:?LYRIC_GEN_HMAC_SECRET must be set in infra/.env.dgx (see ADR 0003)}"
      LYRIC_GEN_HMAC_SECRET_NEXT: "${LYRIC_GEN_HMAC_SECRET_NEXT:-}"
      INDICBART_MODEL_ID: "${INDICBART_MODEL_ID:-ai4bharat/IndicBART}"
      LYRIC_GEN_MAX_CONCURRENT: "${LYRIC_GEN_MAX_CONCURRENT:-4}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - "${LYRIC_GEN_HF_HOME_HOST:-/var/cache/huggingface}:/var/cache/huggingface:ro"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - >-
          import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8090/healthz', timeout=4);
          sys.exit(0 if r.status==200 else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  cover-art-synth:
    # v1.3 Sprint 3: cover-art sidecar. Generates PNG cover art for completed
    # songs. COVER_ART_HMAC_SECRET is the server-side auth key; the worker
    # uses COVER_ART_SYNTH_HMAC_SECRET (same value, different env name convention).
    build:
      context: ../services/cover-art-synth
      dockerfile: Dockerfile
    image: neo-fm/cover-art-synth:phase1
    container_name: neo-fm-cover-art-synth
    restart: unless-stopped
    expose:
      - "8090"
    ports:
      - "127.0.0.1:8091:8090"
    env_file:
      - .env.dgx
    environment:
      COVER_ART_HMAC_SECRET: "${COVER_ART_HMAC_SECRET:?COVER_ART_HMAC_SECRET must be set in infra/.env.dgx}"
      COVER_ART_HMAC_SECRET_NEXT: "${COVER_ART_HMAC_SECRET_NEXT:-}"
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - >-
          import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8090/healthz', timeout=4);
          sys.exit(0 if r.status==200 else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: neo-fm-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-lifecycle"
    volumes:
      - "./prometheus.yml:/etc/prometheus/prometheus.yml:ro"
      - "./grafana/alerts.yaml:/etc/neo-fm/alerts.yaml:ro"
      - "neo-fm-prom-data:/prometheus"
    ports:
      - "127.0.0.1:9090:9090"
    profiles: ["monitoring"]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: neo-fm-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - "./grafana/provisioning:/etc/grafana/provisioning:ro"
      - "./grafana/neo-fm-overview.json:/var/lib/grafana/dashboards/neo-fm-overview.json:ro"
      - "neo-fm-grafana-data:/var/lib/grafana"
    ports:
      - "127.0.0.1:3001:3000"
    profiles: ["monitoring"]

volumes:
  neo-fm-prom-data: {}
  neo-fm-grafana-data: {}
