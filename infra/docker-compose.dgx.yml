# neo-fm — docker-compose for DGX-side services.
#
# Phase 0: brings up music-inference (FastAPI stub) + dgx-worker (print-loop) +
#          vocal-synth (placeholder). No GPU is required because no real model
#          is loaded yet.
# Phase 1: music-inference container switches to nvcr.io/nvidia/pytorch:24.08-py3
#          and gains `deploy.resources.reservations.devices` for GPU access.
#
# Usage (from repo root):
#   cp infra/.env.dgx.example infra/.env.dgx     # fill MUSIC_INFERENCE_HMAC_SECRET
#   docker compose -f infra/docker-compose.dgx.yml --env-file infra/.env.dgx up --build
#
# Per ADR 0003 (internal-API HMAC):
# - music-inference exposes port 8000 only on the internal compose network,
#   NOT on the host. The dgx-worker reaches it as `http://music-inference:8000`.
# - The shared HMAC secret is injected via env_file, never via -p, never logged.

name: neo-fm

services:
  music-inference:
    build:
      context: ../services/music-inference
      dockerfile: Dockerfile
    image: neo-fm/music-inference:phase-0
    container_name: neo-fm-music-inference
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      PHASE: "0"
      MUSIC_INFERENCE_HMAC_SECRET: "${MUSIC_INFERENCE_HMAC_SECRET:?MUSIC_INFERENCE_HMAC_SECRET must be set in infra/.env.dgx (see ADR 0003)}"
      MUSIC_INFERENCE_HMAC_SECRET_NEXT: "${MUSIC_INFERENCE_HMAC_SECRET_NEXT:-}"
      LOG_LEVEL: "INFO"
    # Phase 1 adds:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # volumes:
    #   - /mnt/models:/mnt/models:ro
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - >-
          import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8000/healthz', timeout=4);
          sys.exit(0 if r.status==200 else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  dgx-worker:
    build:
      context: ../services/dgx-worker
      dockerfile: Dockerfile
    image: neo-fm/dgx-worker:phase-0
    container_name: neo-fm-dgx-worker
    restart: unless-stopped
    depends_on:
      music-inference:
        condition: service_healthy
    environment:
      MUSIC_INFERENCE_URL: "http://music-inference:8000"
      MUSIC_INFERENCE_HMAC_SECRET: "${MUSIC_INFERENCE_HMAC_SECRET:?MUSIC_INFERENCE_HMAC_SECRET must be set in infra/.env.dgx (see ADR 0003)}"
      POLL_INTERVAL_SECONDS: "5"
      PHASE: "0"
      LOG_LEVEL: "INFO"

  vocal-synth:
    build:
      context: ../services/vocal-synth
      dockerfile: Dockerfile
    image: neo-fm/vocal-synth:phase-0
    container_name: neo-fm-vocal-synth
    restart: "no"
    profiles: ["phase-7"]
