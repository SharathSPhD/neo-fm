# neo-fm — docker-compose for DGX-side services.
#
# Phase 4 (merged): real dgx-worker pulling from Supabase pgmq and calling
# music-inference over the internal compose network. HeartMuLa weights are
# mounted read-only from the host. No public ingress; cloud never reaches in.
#
# Phase 1 (this branch): music-inference runs the real HeartMuLa model on GPU.
# The container target defaults to `phase1`. Set MUSIC_INFERENCE_STAGE=phase0
# in the env file to drop back to the no-model fake (useful while waiting
# for weight download or on machines without an NVIDIA runtime).
#
# Usage (from repo root):
#   bash scripts/dgx-bootstrap.sh                   # writes infra/.env.dgx + brings stack up
#
# ...or manually:
#   cp infra/.env.dgx.example infra/.env.dgx        # fill MUSIC_INFERENCE_HMAC_SECRET etc
#   python scripts/download-heartmula.py            # pull weights to /mnt/models/heartmula
#   docker compose -f infra/docker-compose.dgx.yml --env-file infra/.env.dgx up --build
#
# Per ADR 0003 (internal-API HMAC):
# - music-inference exposes port 8000 only on the internal compose network,
#   NOT on the host. The dgx-worker reaches it as `http://music-inference:8000`.
# - The shared HMAC secret lives in `infra/.env.dgx` (mode 0600) and is
#   injected via env_file. It is **never** mirrored to Vercel/cloud
#   (cloud has no business calling music-inference).
#
# Per ADR 0004 the dgx-worker connects to Supabase Postgres as the dedicated
# `neo_fm_worker` role (PG_DSN), not as `service_role`. Storage uploads use
# the service-role key over the public Supabase REST endpoint.

name: neo-fm

services:
  music-inference:
    build:
      context: ../services/music-inference
      dockerfile: Dockerfile
      args:
        STAGE: "${MUSIC_INFERENCE_STAGE:-phase1}"
    image: "neo-fm/music-inference:${MUSIC_INFERENCE_STAGE:-phase1}"
    container_name: neo-fm-music-inference
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env.dgx
    environment:
      PHASE: "1"
      MUSIC_INFERENCE_HMAC_SECRET: "${MUSIC_INFERENCE_HMAC_SECRET:?MUSIC_INFERENCE_HMAC_SECRET must be set in infra/.env.dgx (see ADR 0003)}"
      MUSIC_INFERENCE_HMAC_SECRET_NEXT: "${MUSIC_INFERENCE_HMAC_SECRET_NEXT:-}"
      HEARTMULA_CKPT_DIR: "${HEARTMULA_CKPT_DIR:-/mnt/models/heartmula}"
      HEARTMULA_VERSION: "${HEARTMULA_VERSION:-3B}"
      HEARTMULA_MULA_DEVICE: "${HEARTMULA_MULA_DEVICE:-cuda}"
      HEARTMULA_CODEC_DEVICE: "${HEARTMULA_CODEC_DEVICE:-cuda}"
      HEARTMULA_MULA_DTYPE: "${HEARTMULA_MULA_DTYPE:-bfloat16}"
      HEARTMULA_CODEC_DTYPE: "${HEARTMULA_CODEC_DTYPE:-float32}"
      HEARTMULA_LAZY_LOAD: "${HEARTMULA_LAZY_LOAD:-0}"
      HEARTMULA_DEFER_LOAD: "${HEARTMULA_DEFER_LOAD:-0}"
      MUSIC_INFERENCE_FAKE_MODEL: "${MUSIC_INFERENCE_FAKE_MODEL:-0}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - "${HEARTMULA_CKPT_DIR_HOST:-/mnt/models/heartmula}:/mnt/models/heartmula:ro"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - >-
          import urllib.request,sys;
          r=urllib.request.urlopen('http://localhost:8000/healthz', timeout=4);
          sys.exit(0 if r.status==200 else 1)
      interval: 30s
      timeout: 5s
      retries: 3
      # Model weights take ~30s to load even on H100/Grace-Blackwell.
      # 180s start_period prevents docker from killing the container
      # during the cold-start window.
      start_period: 180s

  dgx-worker:
    build:
      context: ../services/dgx-worker
      dockerfile: Dockerfile
    image: neo-fm/dgx-worker:phase-4
    container_name: neo-fm-dgx-worker
    restart: unless-stopped
    depends_on:
      music-inference:
        condition: service_healthy
    env_file:
      - .env.dgx
    environment:
      PHASE: "4"
      MUSIC_INFERENCE_URL: "http://music-inference:8000"
      LOG_LEVEL: "INFO"

  vocal-synth:
    build:
      context: ../services/vocal-synth
      dockerfile: Dockerfile
    image: neo-fm/vocal-synth:phase-0
    container_name: neo-fm-vocal-synth
    restart: "no"
    profiles: ["phase-7"]
