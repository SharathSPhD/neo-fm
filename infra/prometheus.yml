# neo-fm Prometheus configuration (Sprint 7).
#
# Scraped by the `monitoring` compose profile in
# infra/docker-compose.dgx.yml. Each target is reachable only on the
# internal compose network -- never exposed to the public internet.

global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    project: neo-fm
    site: dgx-spark

rule_files:
  - "/etc/neo-fm/alerts.yaml"

scrape_configs:
  - job_name: music-inference
    metrics_path: /metrics
    static_configs:
      - targets: ["music-inference:8000"]
        labels:
          service: music-inference

  - job_name: vocal-synth
    metrics_path: /metrics
    static_configs:
      - targets: ["vocal-synth:8089"]
        labels:
          service: vocal-synth

  - job_name: dgx-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["dgx-worker:9101"]
        labels:
          service: dgx-worker
